apiVersion: apps/v1
kind: Deployment
metadata:
  name: impactflow-api
  labels:
    app: impactflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: impactflow-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: impactflow-api
    spec:
      containers:
        - name: api
          image: impactflow-api:0.19.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: impactflow-api-config
            - secretRef:
                name: impactflow-api-secrets
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: impactflow-api
spec:
  selector:
    app: impactflow-api
  ports:
    - port: 80
      targetPort: 8000

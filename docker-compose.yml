services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: impactflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-impactflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-impactflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-impactflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-impactflow} -d ${POSTGRES_DB:-impactflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: impactflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: impactflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-impactflow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-impactflow_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: impactflow-api
    restart: unless-stopped
    environment:
      APP_ENV: development
      DEBUG: "true"
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-impactflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-impactflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-impactflow}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-impactflow}:${POSTGRES_PASSWORD:-impactflow_dev_password}@postgres:5432/${POSTGRES_DB:-impactflow}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev_only_change_me_to_a_long_random_secret_key_64chars_min}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      BACKEND_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:8081","http://127.0.0.1:8081","exp://127.0.0.1:8081"]'
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-impactflow}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-impactflow_minio_secret}
      S3_BUCKET: impactflow
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # Optional: docker compose --profile full up --build
  # Default path on Windows: run web locally with npm run dev
  web:
    profiles: ["full"]
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: impactflow-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: ImpactFlow AI
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
  minio_data:

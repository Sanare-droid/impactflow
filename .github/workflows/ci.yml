name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Ruff
        run: ruff check app tests
      - name: Pytest
        env:
          APP_ENV: test
          JOBS_ENABLED: "false"
          JWT_SECRET_KEY: test_jwt_secret_key_for_ci_at_least_32_chars_long
          ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
        run: pytest -q

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_APP_NAME: ImpactFlow AI
          NEXT_PUBLIC_APP_URL: http://localhost:3000
        run: npm run build

  e2e:
    name: Web smoke (Playwright)
    runs-on: ubuntu-latest
    needs: [api, web]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: impactflow
          POSTGRES_PASSWORD: impactflow_ci
          POSTGRES_DB: impactflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U impactflow -d impactflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      APP_ENV: development
      JOBS_ENABLED: "false"
      POSTGRES_USER: impactflow
      POSTGRES_PASSWORD: impactflow_ci
      POSTGRES_DB: impactflow
      DATABASE_URL: postgresql+asyncpg://impactflow:impactflow_ci@localhost:5432/impactflow
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test_jwt_secret_key_for_ci_at_least_32_chars_long
      ENCRYPTION_KEY: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: ImpactFlow AI
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      E2E_WEB_URL: http://localhost:3000
      E2E_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install API
        working-directory: apps/api
        run: pip install -r requirements.txt
      - name: Migrate
        working-directory: apps/api
        run: alembic upgrade head
      - name: Start API
        working-directory: apps/api
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
      - name: Install web
        working-directory: apps/web
        run: npm ci
      - name: Build web
        working-directory: apps/web
        run: npm run build
      - name: Start web
        working-directory: apps/web
        run: |
          npm run start -- --port 3000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/login && break
            sleep 1
          done
      - name: Install Playwright
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Run smoke
        working-directory: apps/web
        run: npm run test:e2e
